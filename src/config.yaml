site:
  name: UpgradR
  site: 'https://upgradr.fr'
  base: '/'
  trailingSlash: false

# Default SEO metadata
metadata:
  title:
    default: UpgradR — Audit & Automatisation pour Entreprises
    template: '%s — UpgradR'
  description: "UpgradR accompagne les entreprises dans l'audit de leurs processus et l'automatisation de leurs tâches répétitives. Passez au niveau supérieur."
  robots:
    index: true
    follow: true
  openGraph:
    site_name: UpgradR
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website

i18n:
  language: fr
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
